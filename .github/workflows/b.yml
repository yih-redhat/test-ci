name: Testing Farm CI

on:
  issue_comment:
    types: [created]

jobs:
  test:
    if: contains(github.event.comment.body, '/t1')
    runs-on: ubuntu-latest
    steps:
      - name: Run Testing Farm tests
        uses: sclorg/testing-farm-as-github-action@v3.1.2
        with:
          compose: Fedora-42
          arch: x86_64
          api_key: ${{ secrets.TESTING_FARM_API_KEY }}
          git_url: https://github.com/yih-redhat/test-ci
          git_ref: main
          tmt_plan_regex: iot-x86
          